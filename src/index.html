<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add_circle,delete,expand_more"
    />
    <title>Todo list</title>
  </head>
  <body>
    <header>
      <div class="addCont">
        <h1>Todos</h1>
        <span class="material-symbols-outlined addBtn" tabindex="0">
          add_circle
        </span>
      </div>
      <div class="projectsCont">
        <button class="projectsBtn">
          Projects
          <span class="material-symbols-outlined">expand_more</span>
        </button>
        <ul class="projectsDropdown hidden">
          <li data-project="default" class="active">Default</li>
        </ul>
      </div>
    </header>

    <div id="modal" class="modal hidden">
      <form id="todoForm">
        <h2>New Todo</h2>
        <input
          type="text"
          id="title"
          name="title"
          placeholder="Title"
          required
        />
        <input type="text" id="desc" name="desc" placeholder="Description" />
        <input type="date" id="dueDate" name="dueDate" required />
        <select id="priority" name="priority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <select id="project" name="project"></select>

        <div class="modal-buttons">
          <button type="button" id="cancelBtn">Cancel</button>
          <button type="submit">Add Todo</button>
        </div>
      </form>
    </div>
    <div id="overlay" class="hidden"></div>

    <div id="app"></div>
  </body>
</html>
